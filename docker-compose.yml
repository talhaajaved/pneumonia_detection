services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pneumonia_detection
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Persist uploaded images
      - media_data:/app/media
      # Mount model weights (place .pth files in same directory as docker-compose.yml)
      - ./best_chest_xray_validator.pth:/app/best_chest_xray_validator.pth:ro
      - ./best_lung_segmentation_unet.pth:/app/best_lung_segmentation_unet.pth:ro
      - ./best_pneumonia_pipeline_v2.pth:/app/best_pneumonia_pipeline_v2.pth:ro
    environment:
      - DJANGO_DEBUG=False
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-change-this-secret-key-in-production}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: pneumonia_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/static:ro
      - media_data:/app/media:ro
    depends_on:
      - web
    profiles:
      - production

volumes:
  media_data:
  static_data:
